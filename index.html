<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLDcage个人网站</title>
    <!-- Firebase SDK (Auth + Database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            backdrop-filter: blur(3px);
        }
        .overlay { background: rgba(0,0,0,0.6); min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0 20px; }
        header h1 { font-size: 3em; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; }
        nav button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #ddd; padding: 10px 25px; border-radius: 30px; cursor: pointer;
            transition: 0.3s; font-size: 1em;
        }
        nav button.active { background: #e9c46a; color: #1a1a2e; border-color: #e9c46a; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255,255,255,0.08); border-radius: 15px; overflow: hidden;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s; display: flex; flex-direction: column;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); }
        .card img, .card video, .card audio { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        .card-body h3 { margin-bottom: 8px; font-size: 1.1em; color: #e9c46a; }
        .card-body p { font-size: 0.9em; color: #ccc; margin-bottom: 10px; }
        .download-btn {
            display: inline-block; background: #2a9d8f; color: white;
            padding: 6px 15px; border-radius: 20px; text-decoration: none; font-size: 0.9em; transition: 0.2s;
            align-self: flex-start; margin-bottom: 10px;
        }
        .download-btn:hover { background: #21867a; }
        /* 评论区 */
        .comments-section { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; }
        .comments-list { max-height: 120px; overflow-y: auto; margin-bottom: 8px; font-size: 0.85em; }
        .comment-item { margin-bottom: 6px; line-height: 1.4; }
        .comment-author { color: #e9c46a; font-weight: bold; }
        .comment-time { color: #888; font-size: 0.75em; margin-left: 8px; }
        .comment-input-row { display: flex; gap: 6px; }
        .comment-input-row input { flex: 1; padding: 6px 12px; border-radius: 15px; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 0.85em; outline: none; }
        .comment-input-row button { padding: 6px 12px; border-radius: 15px; border: none; background: #e9c46a; color: #1a1a2e; font-weight: bold; cursor: pointer; font-size: 0.85em; }
        .comment-login-hint { color: #aaa; font-size: 0.8em; text-align: center; cursor: pointer; }
        .comment-login-hint:hover { text-decoration: underline; }

        .admin-panel { background: rgba(0,0,0,0.7); border-radius: 20px; padding: 25px; margin: 20px 0; display: none; }
        .admin-panel.visible { display: block; }
        .admin-panel h2 { color: #e9c46a; margin-bottom: 20px; }
        .admin-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select, textarea {
            padding: 10px 15px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.15); color: white; outline: none; font-size: 0.95em;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 25px;
            background: #e76f51; color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { opacity: 0.9; }
        .submission-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 10px 0; }
        .login-btn { background: #2a9d8f; }
        .logout-btn { background: #e76f51; }
        .note { color: #aaa; font-size: 0.85em; margin: 5px 0; }

        /* 全屏灯箱 */
        .lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .lightbox.active { display: flex; }
        .lightbox .close {
            position: absolute; top: 20px; right: 30px;
            font-size: 2.5em; color: white; cursor: pointer; z-index: 10;
        }
        .lightbox img, .lightbox video {
            max-width: 90%; max-height: 80%; border-radius: 10px;
        }
        #publishedItemsList { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        #publishedItemsList div { display: flex; justify-content: space-between; padding: 8px 15px; margin: 5px 0; background: rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body>
<div class="overlay">
<div class="container">
    <header>
        <h1 id="siteTitle">WLDcage个人网站</h1>
        <p style="text-align:center; color:#ccc;">个人作品集 · 分享平台</p>
    </header>
    <nav id="mainNav">
        <button class="active" data-cat="all">全部</button>
        <button data-cat="photo">📷 摄影</button>
        <button data-cat="illustration">🎨 插画</button>
        <button data-cat="music">🎵 音乐</button>
        <button data-cat="video">🎬 视频</button>
        <button data-cat="program">💻 程序</button>
        <button data-cat="model">🗿 建模</button>
        <button data-cat="game">🎮 游戏</button>
        <button data-cat="other">📦 其他</button>
        <button data-cat="lottery">🎰 抽奖</button>
    </nav>

    <div style="text-align:right; margin-bottom:10px;">
        <span id="userStatus" style="margin-right:15px;"></span>
        <button id="loginBtn" class="login-btn">🔐 登录 / 注册</button>
        <button id="logoutBtn" class="logout-btn" style="display:none;">退出</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h2>📋 内容管理</h2>
        <div class="admin-row">
            <select id="uploadCat">
                <option value="photo">摄影</option>
                <option value="illustration">插画</option>
                <option value="music">音乐</option>
                <option value="video">视频</option>
                <option value="program">程序</option>
                <option value="model">建模</option>
                <option value="game">游戏</option>
                <option value="other">其他</option>
            </select>
            <input type="text" id="uploadTitle" placeholder="作品标题">
            <input type="text" id="uploadDesc" placeholder="简短描述">
            <button id="adminUploadBtn">⬆️ 上传作品</button>
        </div>

        <h3 style="margin-top:30px;">📬 待审核投稿</h3>
        <div id="pendingSubmissions">加载中...</div>

        <h3 style="margin-top:30px;">📂 已发布作品管理</h3>
        <div id="publishedItemsList">加载中...</div>
    </div>

    <!-- 抽奖界面 -->
    <div id="lotteryPanel" style="display:none;">
        <div style="background:rgba(0,0,0,0.4); border-radius:25px; padding:30px; max-width:500px; margin:0 auto; text-align:center;">
            <h2 style="color:#e9c46a; margin-bottom:20px;">🎰 幸运抽奖</h2>
            <div id="lotteryAdmin" style="display:none; margin-bottom:20px;">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" id="newPrizeName" placeholder="奖品名称" style="flex:1;">
                    <button id="addPrizeBtn">➕ 添加</button>
                </div>
                <div style="display:flex; gap:10px; justify-content:center; margin:10px 0;">
                    <button id="exportLotteryBtn" style="background:#2a9d8f;">📤 导出备份</button>
                    <button id="importLotteryBtn" style="background:#3498db;">📥 导入恢复</button>
                </div>
                <div id="prizeListContainer" style="text-align:left; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px; margin-top:10px;">
                    <p style="color:#aaa;">奖品列表加载中...</p>
                </div>
            </div>
            <p style="margin:15px 0; color:#ccc;">当前奖品数量：<strong id="prizeCount">0</strong></p>
            <button id="drawBtn" style="font-size:1.4em; padding:15px 40px;">🎲 抽奖</button>
            <div id="drawResult" style="margin-top:25px; font-size:2em; font-weight:bold; color:#e9c46a; min-height:60px;">✨ 试试手气</div>
        </div>
    </div>

    <div class="grid" id="contentGrid">加载中...</div>

    <div style="text-align:center; margin:40px 0;">
        <button id="submitBtn" style="font-size:1.2em; padding:12px 30px;">✉️ 向我投稿</button>
    </div>
</div>
</div>

<!-- 登录弹窗 -->
<div id="loginModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#222; padding:30px; border-radius:20px; text-align:center; max-width:350px; width:90%;">
        <h2>登录 / 注册</h2>
        <input type="email" id="loginEmail" placeholder="邮箱" style="display:block; width:100%; margin:10px 0;">
        <input type="password" id="loginPass" placeholder="密码" style="display:block; width:100%; margin:10px 0;">
        <button onclick="login()" style="margin:5px;">登录</button>
        <button onclick="register()" style="background:#2a9d8f; margin:5px;">注册新账号</button>
        <button onclick="closeLogin()" style="background:#555; margin:5px;">取消</button>
    </div>
</div>

<!-- 全屏灯箱 -->
<div class="lightbox" id="lightbox">
    <span class="close" id="closeLightbox">&times;</span>
    <div id="lightboxContent"></div>
</div>

<script>
// ======================== 🔧 配置区（已替换为你自己的信息） ========================
const firebaseConfig = {
    apiKey: "AIzaSyAmSG0NPhfZ2YFKgaD4wR9nmCirZnVgxo0",
    authDomain: "share-wldcage.firebaseapp.com",
    databaseURL: "https://share-wldcage-default-rtdb.firebaseio.com",
    projectId: "share-wldcage",
    storageBucket: "share-wldcage.firebasestorage.app",
    messagingSenderId: "270984368043",
    appId: "1:270984368043:web:3253e1283f8bd1ae974cee",
    measurementId: "G-7VSMRGF7T5"
};

const CLOUDINARY_CLOUD_NAME = "df8gjalig";
const CLOUDINARY_UPLOAD_PRESET = "my_website";

const SITE_TITLE = "WLDcage个人网站";
const BG_IMAGE_URL = "";  // 你之前填的背景图链接在这里
// ==========================================================

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

if (BG_IMAGE_URL) {
    document.body.style.backgroundImage = `url('${BG_IMAGE_URL}')`;
}
document.getElementById('siteTitle').textContent = SITE_TITLE;
document.title = SITE_TITLE;

let currentUser = null;
let isAdmin = false;
let currentFilter = 'all';

// 用户状态监听
auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
        document.getElementById('userStatus').textContent = `你好，${user.email}`;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline';
        db.ref('admins/' + user.uid).once('value').then(snap => {
            isAdmin = snap.exists();
            if (isAdmin) {
                document.getElementById('adminPanel').classList.add('visible');
                loadPendingSubmissions();
                loadPublishedItems();
            } else {
                document.getElementById('adminPanel').classList.remove('visible');
            }
            const lotteryAdminDiv = document.getElementById('lotteryAdmin');
            if (lotteryAdminDiv) {
                lotteryAdminDiv.style.display = isAdmin ? 'block' : 'none';
            }
            if (currentFilter === 'lottery') {
                initLottery();
            }
        });
    } else {
        document.getElementById('userStatus').textContent = '';
        document.getElementById('loginBtn').style.display = 'inline';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('adminPanel').classList.remove('visible');
        isAdmin = false;
        const lotteryAdminDiv = document.getElementById('lotteryAdmin');
        if (lotteryAdminDiv) lotteryAdminDiv.style.display = 'none';
    }
});

// 登录/注册
document.getElementById('loginBtn').addEventListener('click', () => {
    document.getElementById('loginModal').style.display = 'flex';
});
document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    auth.signInWithEmailAndPassword(email, pass)
        .then(() => { document.getElementById('loginModal').style.display = 'none'; })
        .catch(e => alert('登录失败: ' + e.message));
}
function register() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    auth.createUserWithEmailAndPassword(email, pass)
        .then(() => {
            alert('注册成功，已自动登录！');
            document.getElementById('loginModal').style.display = 'none';
        })
        .catch(e => alert('注册失败: ' + e.message));
}
function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

// 分类筛选
document.querySelectorAll('#mainNav button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#mainNav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.cat;
        if (currentFilter === 'lottery') {
            document.getElementById('lotteryPanel').style.display = 'block';
            document.getElementById('contentGrid').style.display = 'none';
            initLottery();
        } else {
            document.getElementById('lotteryPanel').style.display = 'none';
            document.getElementById('contentGrid').style.display = '';
            loadPublicItems();
        }
    });
});

// 加载公开作品
function loadPublicItems() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = '加载中...';
    db.ref('items').once('value').then(snap => {
        const items = snap.val() || {};
        let html = '';
        for (let id in items) {
            const item = items[id];
            if (currentFilter !== 'all' && item.category !== currentFilter) continue;
            html += createCard(item, id);
        }
        grid.innerHTML = html || '<p style="grid-column:1/-1; text-align:center; color:#aaa;">暂无内容</p>';
        for (let id in items) {
            const item = items[id];
            if (currentFilter !== 'all' && item.category !== currentFilter) continue;
            loadCommentsForItem(id);
            const card = document.querySelector(`[data-item-id="${id}"]`);
            if (card) {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.download-btn') || e.target.closest('.comments-section') || e.target.closest('button')) return;
                    openLightbox(item);
                });
            }
        }
    });
}

function createCard(item, itemId) {
    let mediaHtml = '';
    if (item.fileType && item.fileType.startsWith('image/')) {
        mediaHtml = `<img src="${item.fileUrl}" alt="${item.title}" loading="lazy">`;
    } else if (item.fileType && item.fileType.startsWith('video/')) {
        mediaHtml = `<video controls preload="metadata"><source src="${item.fileUrl}" type="${item.fileType}"></video>`;
    } else if (item.fileType && item.fileType.startsWith('audio/')) {
        mediaHtml = `<audio controls preload="metadata"><source src="${item.fileUrl}" type="${item.fileType}"></audio>`;
    } else {
        mediaHtml = `<div style="height:180px; display:flex; align-items:center; justify-content:center; background:#333;">📁 ${item.fileName || '文件'}</div>`;
    }
    return `
    <div class="card" data-item-id="${itemId}">
        ${mediaHtml}
        <div class="card-body">
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.desc || '')}</p>
            <a class="download-btn" href="${item.fileUrl}" target="_blank" download>下载</a>
            <div class="comments-section" id="comments-${itemId}">
                <div class="comments-list" id="comments-list-${itemId}">加载评论...</div>
                <div class="comment-input-row" id="comment-input-row-${itemId}">
                    <input type="text" placeholder="写下你的评论..." id="comment-input-${itemId}" style="flex:1;">
                    <button id="comment-submit-${itemId}">发送</button>
                </div>
                <div class="comment-login-hint" id="comment-login-hint-${itemId}" style="display:none;">请先登录才能评论</div>
            </div>
        </div>
    </div>`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 全屏预览
const lightbox = document.getElementById('lightbox');
const lightboxContent = document.getElementById('lightboxContent');
document.getElementById('closeLightbox').addEventListener('click', () => {
    lightbox.classList.remove('active');
    lightboxContent.innerHTML = '';
});
lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
        lightbox.classList.remove('active');
        lightboxContent.innerHTML = '';
    }
});

function openLightbox(item) {
    lightboxContent.innerHTML = '';
    if (item.fileType && item.fileType.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = item.fileUrl;
        img.alt = item.title;
        lightboxContent.appendChild(img);
    } else if (item.fileType && item.fileType.startsWith('video/')) {
        const video = document.createElement('video');
        video.controls = true;
        video.style.maxWidth = '90%';
        video.style.maxHeight = '80%';
        const source = document.createElement('source');
        source.src = item.fileUrl;
        source.type = item.fileType;
        video.appendChild(source);
        lightboxContent.appendChild(video);
    } else if (item.fileType && item.fileType.startsWith('audio/')) {
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.style.width = '80%';
        const source = document.createElement('source');
        source.src = item.fileUrl;
        source.type = item.fileType;
        audio.appendChild(source);
        lightboxContent.appendChild(audio);
    } else {
        window.open(item.fileUrl, '_blank');
        return;
    }
    lightbox.classList.add('active');
}

// 评论功能
function loadCommentsForItem(itemId) {
    const listDiv = document.getElementById('comments-list-' + itemId);
    if (!listDiv) return;
    db.ref('comments/' + itemId).limitToLast(20).on('value', snap => {
        const comments = snap.val() || {};
        let html = '';
        const sorted = Object.entries(comments).sort((a,b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));
        for (let [cid, comment] of sorted) {
            const timeStr = comment.timestamp ? new Date(comment.timestamp).toLocaleString() : '';
            html += `<div class="comment-item">
                <span class="comment-author">${escapeHtml(comment.email || '匿名')}</span>
                <span class="comment-time">${timeStr}</span>
                <span>${escapeHtml(comment.text)}</span>
            </div>`;
        }
        listDiv.innerHTML = html || '<div style="color:#aaa;">暂无评论</div>';
    });

    const submitBtn = document.getElementById('comment-submit-' + itemId);
    if (submitBtn) {
        submitBtn.onclick = function() {
            if (!currentUser) {
                document.getElementById('comment-login-hint-' + itemId).style.display = 'block';
                document.getElementById('loginModal').style.display = 'flex';
                return;
            }
            const input = document.getElementById('comment-input-' + itemId);
            const text = input.value.trim();
            if (!text) return;
            const commentData = {
                uid: currentUser.uid,
                email: currentUser.email,
                text: text,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            };
            db.ref('comments/' + itemId).push(commentData).then(() => {
                input.value = '';
            }).catch(err => alert('评论失败: ' + err.message));
        };
    }
    const hint = document.getElementById('comment-login-hint-' + itemId);
    if (hint) {
        hint.style.display = currentUser ? 'none' : 'block';
    }
}

// Cloudinary 上传窗口
function openCloudinaryWidget(callback) {
    cloudinary.openUploadWidget({
        cloudName: CLOUDINARY_CLOUD_NAME,
        uploadPreset: CLOUDINARY_UPLOAD_PRESET,
        sources: ['local', 'url', 'camera'],
        multiple: false,
        maxFileSize: 100000000
    }, (error, result) => {
        if (!error && result && result.event === 'success') {
            const info = result.info;
            callback({
                fileUrl: info.secure_url,
                fileType: info.resource_type === 'image' ? 'image/' + info.format :
                          info.resource_type === 'video' ? 'video/' + info.format :
                          info.resource_type === 'raw' ? 'application/octet-stream' : 'application/octet-stream',
                fileName: info.original_filename + '.' + info.format
            });
        }
    });
}

// 管理员上传
document.getElementById('adminUploadBtn').addEventListener('click', () => {
    if (!isAdmin) return alert('仅管理员可操作');
    const cat = document.getElementById('uploadCat').value;
    const title = document.getElementById('uploadTitle').value.trim();
    const desc = document.getElementById('uploadDesc').value.trim();
    if (!title) return alert('请填写标题');
    openCloudinaryWidget((fileInfo) => {
        const newItem = {
            title, desc, category: cat,
            fileUrl: fileInfo.fileUrl,
            fileType: fileInfo.fileType,
            fileName: fileInfo.fileName,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('items').push(newItem).then(() => {
            alert('上传成功！');
            document.getElementById('uploadTitle').value = '';
            document.getElementById('uploadDesc').value = '';
            loadPublicItems();
            if (isAdmin) loadPublishedItems();
        }).catch(err => alert('保存失败: ' + err.message));
    });
});

// 已发布作品管理
function loadPublishedItems() {
    const container = document.getElementById('publishedItemsList');
    container.innerHTML = '加载中...';
    db.ref('items').once('value').then(snap => {
        const items = snap.val() || {};
        let html = '';
        for (let id in items) {
            const item = items[id];
            html += `<div>
                <span>${escapeHtml(item.title)} (${item.category})</span>
                <button onclick="deleteItem('${id}')" style="background:#e74c3c; padding:5px 15px;">🗑️ 下架</button>
            </div>`;
        }
        container.innerHTML = html || '暂无作品';
    });
}

async function deleteItem(itemId) {
    if (!isAdmin) return;
    if (!confirm('确定下架这个作品吗？此操作不可恢复。')) return;
    try {
        await db.ref('items/' + itemId).remove();
        alert('作品已下架');
        loadPublicItems();
        loadPublishedItems();
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

// 访客投稿
document.getElementById('submitBtn').addEventListener('click', () => {
    if (!currentUser) {
        alert('请先登录（可使用任意邮箱注册）');
        document.getElementById('loginModal').style.display = 'flex';
        return;
    }
    const title = prompt('作品标题');
    if (!title) return;
    const desc = prompt('简短描述（可选）') || '';
    const cat = prompt('分类（photo/illustration/music/video/program/model/game/other）') || 'other';
    openCloudinaryWidget((fileInfo) => {
        const submission = {
            uid: currentUser.uid,
            email: currentUser.email,
            title, desc, category: cat,
            fileUrl: fileInfo.fileUrl,
            fileType: fileInfo.fileType,
            fileName: fileInfo.fileName,
            status: 'pending',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('submissions/' + currentUser.uid).push(submission).then(() => {
            alert('投稿成功，等待审核！');
        }).catch(err => alert('提交失败: ' + err.message));
    });
});

// 待审核加载
function loadPendingSubmissions() {
    if (!isAdmin) return;
    db.ref('submissions').once('value').then(snap => {
        const allSubs = snap.val() || {};
        let html = '';
        for (let uid in allSubs) {
            for (let subId in allSubs[uid]) {
                const sub = allSubs[uid][subId];
                if (sub.status !== 'pending') continue;
                html += `
                <div class="submission-item">
                    <strong>${escapeHtml(sub.title)}</strong> (${sub.category}) by ${sub.email}<br>
                    <a href="${sub.fileUrl}" target="_blank">预览文件</a>
                    <button onclick="approve('${uid}','${subId}')">✅ 通过</button>
                    <button onclick="reject('${uid}','${subId}')" style="background:#e74c3c;">❌ 拒绝</button>
                </div>`;
            }
        }
        document.getElementById('pendingSubmissions').innerHTML = html || '暂无待审核';
    });
}

async function approve(uid, subId) {
    try {
        const subSnap = await db.ref('submissions/' + uid + '/' + subId).once('value');
        const sub = subSnap.val();
        if (!sub) return;
        await db.ref('items').push({
            title: sub.title, desc: sub.desc, category: sub.category,
            fileUrl: sub.fileUrl, fileType: sub.fileType, fileName: sub.fileName,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        await db.ref('submissions/' + uid + '/' + subId + '/status').set('approved');
        alert('已通过并发布');
        loadPendingSubmissions();
        loadPublicItems();
        loadPublishedItems();
    } catch (e) { alert('操作失败: ' + e.message); }
}

async function reject(uid, subId) {
    if (confirm('确定拒绝？')) {
        await db.ref('submissions/' + uid + '/' + subId + '/status').set('rejected');
        loadPendingSubmissions();
    }
}

// ==================== 抽奖功能 ====================
let lotteryPrizes = [];

function initLottery() {
    db.ref('lottery/prizes').once('value').then(snap => {
        lotteryPrizes = snap.val() || [];
        renderPrizeList();
        document.getElementById('prizeCount').textContent = lotteryPrizes.length;
    });
}

function renderPrizeList() {
    const container = document.getElementById('prizeListContainer');
    if (!isAdmin) {
        container.innerHTML = '<p style="color:#aaa;">仅管理员可查看奖品列表</p>';
        return;
    }
    if (lotteryPrizes.length === 0) {
        container.innerHTML = '<p style="color:#aaa;">暂无奖品，请添加</p>';
        return;
    }
    let html = '<ul style="list-style:none; padding:0;">';
    lotteryPrizes.forEach((prize, index) => {
        html += `<li style="display:flex; justify-content:space-between; align-items:center; padding:8px 15px; background:rgba(255,255,255,0.1); margin:5px 0; border-radius:20px;">
            <span>${escapeHtml(prize)}</span>
            <button class="delete-prize-btn" data-index="${index}" style="background:rgba(255,80,80,0.5); border:none; color:white; width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:14px; line-height:24px; text-align:center;">×</button>
        </li>`;
    });
    html += '</ul>';
    container.innerHTML = html;

    container.querySelectorAll('.delete-prize-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const idx = e.target.getAttribute('data-index');
            if (confirm(`确定删除奖品“${lotteryPrizes[idx]}”吗？`)) {
                lotteryPrizes.splice(idx, 1);
                saveLotteryToDB();
            }
        });
    });
}

function saveLotteryToDB() {
    db.ref('lottery/prizes').set(lotteryPrizes).then(() => {
        renderPrizeList();
        document.getElementById('prizeCount').textContent = lotteryPrizes.length;
    }).catch(err => alert('保存失败: ' + err.message));
}

document.getElementById('addPrizeBtn').addEventListener('click', () => {
    if (!isAdmin) return;
    const nameInput = document.getElementById('newPrizeName');
    const name = nameInput.value.trim();
    if (!name) return alert('请输入奖品名称');
    lotteryPrizes.push(name);
    nameInput.value = '';
    saveLotteryToDB();
});

document.getElementById('drawBtn').addEventListener('click', () => {
    if (lotteryPrizes.length === 0) {
        document.getElementById('drawResult').innerHTML = '⚠️ 奖品池为空';
        return;
    }
    const randomIndex = Math.floor(Math.random() * lotteryPrizes.length);
    const winner = lotteryPrizes[randomIndex];
    document.getElementById('drawResult').innerHTML = `🏆 ${escapeHtml(winner)} 🏆`;
});

document.getElementById('exportLotteryBtn').addEventListener('click', () => {
    if (!isAdmin) return;
    const code = btoa(unescape(encodeURIComponent(JSON.stringify(lotteryPrizes))));
    prompt('请复制以下备份码（可在其他设备导入）', code);
});

document.getElementById('importLotteryBtn').addEventListener('click', () => {
    if (!isAdmin) return;
    const code = prompt('请粘贴备份码');
    if (!code) return;
    try {
        const decoded = decodeURIComponent(escape(atob(code.trim())));
        const newPrizes = JSON.parse(decoded);
        if (!Array.isArray(newPrizes)) throw new Error('格式错误');
        if (confirm(`即将导入 ${newPrizes.length} 个奖品，覆盖当前奖池，确定吗？`)) {
            lotteryPrizes = newPrizes;
            saveLotteryToDB();
            alert('导入成功！');
        }
    } catch (e) {
        alert('备份码无效，请检查是否完整复制');
    }
});

// 初始化
loadPublicItems();
</script>
