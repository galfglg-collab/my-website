<!OCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <!-- Firebase SDK (Auth + Database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            min-height: 100vh;
            backdrop-filter: blur(3px);
        }
        .overlay { background: rgba(0,0,0,0.6); min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0 20px; }
        header h1 { font-size: 3em; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; }
        nav button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: #ddd; padding: 10px 25px; border-radius: 30px; cursor: pointer;
            transition: 0.3s; font-size: 1em;
        }
        nav button.active { background: #e9c46a; color: #1a1a2e; border-color: #e9c46a; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255,255,255,0.08); border-radius: 15px; overflow: hidden;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }
        .card img, .card video, .card audio { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; flex: 1; }
        .card-body h3 { margin-bottom: 8px; font-size: 1.1em; color: #e9c46a; }
        .card-body p { font-size: 0.9em; color: #ccc; margin-bottom: 10px; }
        .download-btn {
            display: inline-block; background: #2a9d8f; color: white;
            padding: 6px 15px; border-radius: 20px; text-decoration: none; font-size: 0.9em; transition: 0.2s;
        }
        .download-btn:hover { background: #21867a; }
        .admin-panel { background: rgba(0,0,0,0.7); border-radius: 20px; padding: 25px; margin: 20px 0; display: none; }
        .admin-panel.visible { display: block; }
        .admin-panel h2 { color: #e9c46a; margin-bottom: 20px; }
        .admin-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        input, select, textarea {
            padding: 10px 15px; border-radius: 20px; border: none;
            background: rgba(255,255,255,0.15); color: white; outline: none; font-size: 0.95em;
        }
        button {
            padding: 10px 20px; border: none; border-radius: 25px;
            background: #e76f51; color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { opacity: 0.9; }
        .submission-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin: 10px 0; }
        .login-btn { background: #2a9d8f; }
        .logout-btn { background: #e76f51; }
        .note { color: #aaa; font-size: 0.85em; margin: 5px 0; }
    </style>
</head>
<body>
<div class="overlay">
<div class="container">
    <header>
        <h1 id="siteTitle">我的个人网站</h1>
        <p style="text-align:center; color:#ccc;">个人作品集 · 分享平台</p>
    </header>

    <nav id="mainNav">
        <button class="active" data-cat="all">全部</button>
        <button data-cat="photo">📷 摄影</button>
        <button data-cat="illustration">🎨 插画</button>
        <button data-cat="music">🎵 音乐</button>
        <button data-cat="program">💻 程序</button>
        <button data-cat="model">🗿 建模</button>
        <button data-cat="game">🎮 游戏</button>
        <button data-cat="other">📦 其他</button>
    </nav>

    <div style="text-align:right; margin-bottom:10px;">
        <span id="userStatus" style="margin-right:15px;"></span>
        <button id="loginBtn" class="login-btn">🔐 管理员登录</button>
        <button id="logoutBtn" class="logout-btn" style="display:none;">退出</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h2>📋 内容管理</h2>
        <div class="admin-row">
            <select id="uploadCat">
                <option value="photo">摄影</option>
                <option value="illustration">插画</option>
                <option value="music">音乐</option>
                <option value="program">程序</option>
                <option value="model">建模</option>
                <option value="game">游戏</option>
                <option value="other">其他</option>
            </select>
            <input type="text" id="uploadTitle" placeholder="作品标题">
            <input type="text" id="uploadDesc" placeholder="简短描述">
            <button id="adminUploadBtn">⬆️ 上传作品</button>
        </div>
        <h3 style="margin-top:30px;">📬 待审核投稿</h3>
        <div id="pendingSubmissions">加载中...</div>
    </div>

    <div class="grid" id="contentGrid">加载中...</div>

    <div style="text-align:center; margin:40px 0;">
        <button id="submitBtn" style="font-size:1.2em; padding:12px 30px;">✉️ 向我投稿</button>
    </div>
</div>
</div>

<!-- 登录弹窗 -->
<div id="loginModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#222; padding:30px; border-radius:20px; text-align:center; max-width:350px; width:90%;">
        <h2>管理员登录</h2>
        <input type="email" id="loginEmail" placeholder="邮箱" style="display:block; width:100%; margin:10px 0;">
        <input type="password" id="loginPass" placeholder="密码" style="display:block; width:100%; margin:10px 0;">
        <button onclick="login()">登录</button>
        <button onclick="closeLogin()" style="background:#555;">取消</button>
    </div>
</div>

<script>
// ======================== 🔧 配置区（请修改为你的信息） ========================
const firebaseConfig = {
    // 粘贴你的 Firebase 配置对象（从 Firebase 控制台复制的）
    apiKey: "AIzaSyAmSG0NPhfZ2YFKgaD4wR9nmCirZnVgxo0",
    authDomain: "share-wldcage.firebaseapp.com",
    databaseURL: "https://share-wldcage-default-rtdb.firebaseio.com",
    projectId: "share-wldcage",
    storageBucket: "share-wldcage.firebasestorage.app",
    messagingSenderId: "270984368043",
    appId: "1:270984368043:web:3253e1283f8bd1ae974cee",
  measurementId: "G-7VSMRGF7T5"
};

const CLOUDINARY_CLOUD_NAME = "df8gjalig";   // 替换成你的 Cloudinary Cloud Name
const CLOUDINARY_UPLOAD_PRESET = "my_website";   // 你创建的 preset 名称

const SITE_TITLE = "WLDcage个人网站";    // 你的网站标题
const BG_IMAGE_URL = "";              // 自定义背景图地址，留空则用默认深蓝背景
// =============================================================================

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

if (BG_IMAGE_URL) {
    document.body.style.backgroundImage = `url('${BG_IMAGE_URL}')`;
}
document.getElementById('siteTitle').textContent = SITE_TITLE;
document.title = SITE_TITLE;

let currentUser = null;
let isAdmin = false;
let currentFilter = 'all';

// 用户状态监听
auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
        document.getElementById('userStatus').textContent = `你好，${user.email}`;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline';
        db.ref('admins/' + user.uid).once('value').then(snap => {
            isAdmin = snap.exists();
            if (isAdmin) {
                document.getElementById('adminPanel').classList.add('visible');
                loadPendingSubmissions();
            } else {
                document.getElementById('adminPanel').classList.remove('visible');
            }
        });
    } else {
        document.getElementById('userStatus').textContent = '';
        document.getElementById('loginBtn').style.display = 'inline';
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('adminPanel').classList.remove('visible');
        isAdmin = false;
    }
});

// 登录/登出逻辑
document.getElementById('loginBtn').addEventListener('click', () => {
    document.getElementById('loginModal').style.display = 'flex';
});
document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    auth.signInWithEmailAndPassword(email, pass)
        .then(() => { document.getElementById('loginModal').style.display = 'none'; })
        .catch(e => alert('登录失败: ' + e.message));
}
function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }

// 分类筛选
document.querySelectorAll('#mainNav button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#mainNav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.cat;
        loadPublicItems();
    });
});

// 加载公开作品
function loadPublicItems() {
    const grid = document.getElementById('contentGrid');
    grid.innerHTML = '加载中...';
    db.ref('items').once('value').then(snap => {
        const items = snap.val() || {};
        let html = '';
        for (let id in items) {
            const item = items[id];
            if (currentFilter !== 'all' && item.category !== currentFilter) continue;
            html += createCard(item);
        }
        grid.innerHTML = html || '<p style="grid-column:1/-1; text-align:center; color:#aaa;">暂无内容</p>';
    });
}

function createCard(item) {
    let mediaHtml = '';
    if (item.fileType && item.fileType.startsWith('image/')) {
        mediaHtml = `<img src="${item.fileUrl}" alt="${item.title}" loading="lazy">`;
    } else if (item.fileType && item.fileType.startsWith('video/')) {
        mediaHtml = `<video controls><source src="${item.fileUrl}" type="${item.fileType}"></video>`;
    } else if (item.fileType && item.fileType.startsWith('audio/')) {
        mediaHtml = `<audio controls><source src="${item.fileUrl}" type="${item.fileType}"></audio>`;
    } else {
        mediaHtml = `<div style="height:180px; display:flex; align-items:center; justify-content:center; background:#333;">📁 ${item.fileName || '文件'}</div>`;
    }
    return `
    <div class="card">
        ${mediaHtml}
        <div class="card-body">
            <h3>${escapeHtml(item.title)}</h3>
            <p>${escapeHtml(item.desc || '')}</p>
            <a class="download-btn" href="${item.fileUrl}" target="_blank" download>下载</a>
        </div>
    </div>`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Cloudinary 上传窗口
function openCloudinaryWidget(callback) {
    cloudinary.openUploadWidget({
        cloudName: CLOUDINARY_CLOUD_NAME,
        uploadPreset: CLOUDINARY_UPLOAD_PRESET,
        sources: ['local', 'url', 'camera'],
        multiple: false,
        maxFileSize: 100000000  // 100MB
    }, (error, result) => {
        if (!error && result && result.event === 'success') {
            const info = result.info;
            callback({
                fileUrl: info.secure_url,
                fileType: info.resource_type === 'image' ? 'image/' + info.format :
                          info.resource_type === 'video' ? 'video/' + info.format :
                          info.resource_type === 'raw' ? 'application/octet-stream' : 'application/octet-stream',
                fileName: info.original_filename + '.' + info.format
            });
        }
    });
}

// 管理员上传
document.getElementById('adminUploadBtn').addEventListener('click', () => {
    if (!isAdmin) return alert('仅管理员可操作');
    const cat = document.getElementById('uploadCat').value;
    const title = document.getElementById('uploadTitle').value.trim();
    const desc = document.getElementById('uploadDesc').value.trim();
    if (!title) return alert('请填写标题');

    openCloudinaryWidget((fileInfo) => {
        const newItem = {
            title, desc, category: cat,
            fileUrl: fileInfo.fileUrl,
            fileType: fileInfo.fileType,
            fileName: fileInfo.fileName,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('items').push(newItem).then(() => {
            alert('上传成功！');
            document.getElementById('uploadTitle').value = '';
            document.getElementById('uploadDesc').value = '';
            loadPublicItems();
        }).catch(err => alert('保存失败: ' + err.message));
    });
});

// 访客投稿
document.getElementById('submitBtn').addEventListener('click', () => {
    if (!currentUser) {
        alert('请先登录（可使用任意邮箱注册，或请管理员为你创建账号）');
        document.getElementById('loginModal').style.display = 'flex';
        return;
    }
    const title = prompt('作品标题');
    if (!title) return;
    const desc = prompt('简短描述（可选）') || '';
    const cat = prompt('分类（photo / illustration / music / program / model / game / other）') || 'other';

    openCloudinaryWidget((fileInfo) => {
        const submission = {
            uid: currentUser.uid,
            email: currentUser.email,
            title, desc, category: cat,
            fileUrl: fileInfo.fileUrl,
            fileType: fileInfo.fileType,
            fileName: fileInfo.fileName,
            status: 'pending',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        db.ref('submissions/' + currentUser.uid).push(submission).then(() => {
            alert('投稿成功，等待管理员审核！');
        }).catch(err => alert('提交失败: ' + err.message));
    });
});

// 加载待审核投稿（仅管理员可见）
function loadPendingSubmissions() {
    if (!isAdmin) return;
    db.ref('submissions').once('value').then(snap => {
        const allSubs = snap.val() || {};
        let html = '';
        for (let uid in allSubs) {
            for (let subId in allSubs[uid]) {
                const sub = allSubs[uid][subId];
                if (sub.status !== 'pending') continue;
                html += `
                <div class="submission-item">
                    <strong>${escapeHtml(sub.title)}</strong> (${sub.category}) by ${sub.email}<br>
                    <a href="${sub.fileUrl}" target="_blank">预览文件</a>
                    <button onclick="approve('${uid}','${subId}')">✅ 通过</button>
                    <button onclick="reject('${uid}','${subId}')" style="background:#e74c3c;">❌ 拒绝</button>
                </div>`;
            }
        }
        document.getElementById('pendingSubmissions').innerHTML = html || '暂无待审核';
    });
}

async function approve(uid, subId) {
    try {
        const subSnap = await db.ref('submissions/' + uid + '/' + subId).once('value');
        const sub = subSnap.val();
        if (!sub) return;
        await db.ref('items').push({
            title: sub.title,
            desc: sub.desc,
            category: sub.category,
            fileUrl: sub.fileUrl,
            fileType: sub.fileType,
            fileName: sub.fileName,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        await db.ref('submissions/' + uid + '/' + subId + '/status').set('approved');
        alert('已通过并发布');
        loadPendingSubmissions();
        loadPublicItems();
    } catch (e) {
        alert('操作失败: ' + e.message);
    }
}

async function reject(uid, subId) {
    if (confirm('确定拒绝该投稿吗？')) {
        await db.ref('submissions/' + uid + '/' + subId + '/status').set('rejected');
        loadPendingSubmissions();
    }
}

// 初始化
loadPublicItems();
</script>
</body>
</html>
